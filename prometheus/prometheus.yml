global:
  scrape_interval: 15s        # Intervalo sugerido por la actividad.
  evaluation_interval: 15s

# Reglas de alerta (bonus).
rule_files:
  - "alerts.yml"

scrape_configs:
  # Scraping de la propia API.
  - job_name: "mi-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:3000"]

  # Prometheus se monitorea a sí mismo (útil para verificar que vive).
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
